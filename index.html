<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeycaNode | Gnoland Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card-bg { background-color: #1e293b; border: 1px solid #334155; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <div id="view-dashboard" class="tab-content active">
            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="card-bg p-6 rounded-2xl"><div class="text-xs text-slate-400">AĞ YÜKSEKLİĞİ</div><div id="live-height" class="text-2xl font-bold mt-2">...</div></div>
                <div class="card-bg p-6 rounded-2xl"><div class="text-xs text-slate-400">AĞ ID</div><div id="live-chain-id" class="text-2xl font-bold text-emerald-400 mt-2">...</div></div>
                <div class="card-bg p-6 rounded-2xl"><div class="text-xs text-slate-400">VALIDATÖR</div><div id="live-val-count" class="text-2xl font-bold mt-2">0</div></div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://gnolandexplorer.zeycanode.com/rpc";

        async function updateData() {
            try {
                // Node'dan ham veriyi çek
                const res = await fetch(`${API}/status`);
                const json = await res.json();
                
                // Gnoland'in güncel veri yapısına göre veri yollarını burada güncelledim
                const status = json.result.sync_info || json.result; 
                const nodeInfo = json.result.node_info || {};

                document.getElementById('live-height').textContent = "#" + (status.latest_block_height || "0");
                document.getElementById('live-chain-id').textContent = nodeInfo.network || "Unknown";

                const valRes = await fetch(`${API}/validators?per_page=100`);
                const valJson = await valRes.json();
                document.getElementById('live-val-count').textContent = valJson.result.validators.length;

            } catch (err) {
                console.error("Veri çekme hatası:", err);
            }
        }
        
        updateData();
        setInterval(updateData, 10000);
    </script>
</body>
</html>
