<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeycaNode | Gnoland Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card-bg { background-color: #1e293b; border: 1px solid #334155; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-link.active { border-bottom: 2px solid #10b981; color: white; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="border-b border-slate-800 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Zeyca<span class="text-zinc-400">Node</span></h1>
            <div class="flex space-x-6 text-sm font-semibold">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="nav-link active pb-1">Dashboard</button>
                <button onclick="switchTab('validators')" id="tab-validators" class="nav-link pb-1">Validatörler</button>
                <button onclick="switchTab('peers')" id="tab-peers" class="nav-link pb-1">Live Peers</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="view-dashboard" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card-bg p-6 rounded-2xl"><div class="text-xs text-slate-400">AĞ YÜKSEKLİĞİ</div><div class="text-3xl font-bold mt-2 font-mono" id="live-height">...</div></div>
                <div class="card-bg p-6 rounded-2xl"><div class="text-xs text-slate-400">AĞ ID</div><div class="text-3xl font-bold text-emerald-400 mt-2 font-mono" id="live-chain-id">...</div></div>
                <div class="card-bg p-6 rounded-2xl"><div class="text-xs text-slate-400">TOPLAM VALIDATÖR</div><div class="text-3xl font-bold mt-2 font-mono" id="live-val-count">0</div></div>
            </div>
        </div>

        <div id="view-validators" class="tab-content">
            <div class="card-bg rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-900/50 text-slate-400"><tr><th class="p-4">Moniker</th><th class="p-4">Hex Adres</th><th class="p-4 text-right">Oy Gücü</th></tr></thead>
                    <tbody id="validators-tbody" class="divide-y divide-slate-800"><tr><td class="p-4">Yükleniyor...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="view-peers" class="tab-content">
            <div class="card-bg rounded-2xl p-6">
                <button onclick="copyPeers()" class="bg-emerald-600 text-xs px-4 py-2 rounded mb-4">Listeyi Kopyala</button>
                <pre id="peer-list-code" class="text-emerald-400 font-mono text-xs whitespace-pre-wrap">Yükleniyor...</pre>
            </div>
        </div>
    </main>

    <script>
        const RPC_URL = "https://gnolandexplorer.zeycanode.com/rpc"; 
        let knownMonikers = {"g1alat...": "ZeycaNode"};

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        function copyPeers() {
            navigator.clipboard.writeText(document.getElementById('peer-list-code').textContent);
            alert("Kopyalandı!");
        }

        async function init() {
            // Monikerleri çek
            try {
                const res = await fetch('https://api.github.com/repos/gnolang/gno/contents/misc/testnet/genesis.json');
                const data = await res.json();
                const gen = JSON.parse(atob(data.content));
                gen.app_state.staking.validators.forEach(v => knownMonikers[v.operator_address] = v.description.moniker);
            } catch(e) { console.log("Genesis yüklenemedi"); }

            // Verileri çek
            try {
                const status = await (await fetch(`${RPC_URL}/status`)).json();
                document.getElementById('live-height').textContent = "#" + parseInt(status.result.sync_info.latest_block_height).toLocaleString();
                document.getElementById('live-chain-id').textContent = status.result.node_info.network;

                const vals = await (await fetch(`${RPC_URL}/validators?per_page=100`)).json();
                document.getElementById('live-val-count').textContent = vals.result.validators.length;
                document.getElementById('validators-tbody').innerHTML = vals.result.validators.map(v => 
                    `<tr><td class="p-4">${knownMonikers[v.address] || 'Bilinmeyen'}</td><td class="p-4 font-mono">${v.address.substring(0,10)}...</td><td class="p-4 text-right">${parseInt(v.voting_power).toLocaleString()}</td></tr>`
                ).join('');

                const peers = await (await fetch(`${RPC_URL}/net_info`)).json();
                document.getElementById('peer-list-code').textContent = peers.result.peers.map(p => `${p.node_info.id}@${p.remote_ip}:${p.node_info.listen_addr.split(':').pop()}`).join(',');
            } catch(e) { console.error(e); }
        }

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
